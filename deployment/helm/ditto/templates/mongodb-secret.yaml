{{- if not .Values.dbconfig.uriSecret -}}
{{- $mongoName := include "ditto.mongodb.fullname" . -}}
{{/*
  Timeseries URI augmentation for AWS IAM (IRSA).

  Sibling services (things, policies, connectivity, thingsSearch) are connected via
  Pekko-Persistence's MongoDB plugin, which honours the `MONGO_DB_USE_AWS_IAM_ROLE` env var
  programmatically through Ditto's DefaultMongoDbConfig — the URI in this secret stays plain.

  Timeseries uses the MongoDB Java driver directly (MongoClients.create(ConnectionString)).
  The driver only invokes MONGODB-AWS auth when the URI itself declares
  `authMechanism=MONGODB-AWS&authSource=$external`; setting AWS env vars alone is not enough.
  So we append those params here when `dbconfig.timeseries.useAwsIamRole` is true. We respect
  any existing query string in the operator-provided URI by using the right separator (& vs ?).
*/}}
{{- $tsUriRaw := .Values.dbconfig.timeseries.uri | replace "#{PLACEHOLDER_MONGODB_HOSTNAME}#" $mongoName -}}
{{- $tsUri := $tsUriRaw -}}
{{- if .Values.dbconfig.timeseries.useAwsIamRole -}}
  {{- $sep := ternary "&" "?" (contains "?" $tsUriRaw) -}}
  {{- $tsUri = printf "%s%sauthMechanism=MONGODB-AWS&authSource=$external" $tsUriRaw $sep -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ditto.fullname" . }}-mongodb-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "ditto.name" . }}-mongodb-secret
{{ include "ditto.labels" . | indent 4 }}
type: Opaque
data:
  connectivity-uri: {{ .Values.dbconfig.connectivity.uri | replace "#{PLACEHOLDER_MONGODB_HOSTNAME}#" $mongoName | b64enc | quote}}
  things-uri: {{ .Values.dbconfig.things.uri | replace "#{PLACEHOLDER_MONGODB_HOSTNAME}#" $mongoName | b64enc | quote}}
  thingsSearch-uri: {{ .Values.dbconfig.thingsSearch.uri | replace "#{PLACEHOLDER_MONGODB_HOSTNAME}#" $mongoName | b64enc | quote}}
  policies-uri: {{ .Values.dbconfig.policies.uri | replace "#{PLACEHOLDER_MONGODB_HOSTNAME}#" $mongoName | b64enc | quote}}
  timeseries-uri: {{ $tsUri | b64enc | quote }}
{{- end }}
