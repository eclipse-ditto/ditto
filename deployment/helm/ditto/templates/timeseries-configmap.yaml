{{- $releaseName := .Release.Name -}}
{{- $name := include "ditto.name" . -}}
{{- $labels := include "ditto.labels" . -}}
{{ $root := . }}
{{- if .Values.timeseries.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $releaseName }}-service-config-timeseries-extension-conf
  namespace: {{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}-service-config-timeseries-extension-conf
{{ $labels | indent 4 }}
data:
  timeseries-extension.conf: |-
{{ tpl ($root.Files.Get "service-config/timeseries-extension.conf.tpl") $ | indent 4 }}
---
{{- end }}
