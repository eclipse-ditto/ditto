ditto.headers {
  # List of header keys whose values should be redacted (replaced by "***") in DittoHeaders.toString() output
  # (e.g. in log statements). This prevents sensitive values like bearer tokens from leaking into logs.
  redacted-in-log = ["authorization"]
  redacted-in-log = ${?DITTO_HEADERS_REDACTED_IN_LOG}
}
