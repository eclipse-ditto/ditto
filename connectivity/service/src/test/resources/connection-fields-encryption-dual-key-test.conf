# Test configuration for dual-key encryption support

# Example 1: Normal operation with single key (standard usage)
normal-connection {
  encryption {
    encryption-enabled = true
    symmetrical-key = "vJFSTPE9PO2BtZlcMAwNjs8jdFvQCk0Ya9MVdYjRJUU="
    json-pointers = ["/uri", "/credentials/password"]
  }
}

# Example 2: During key rotation (dual-key configuration)
# Old data encrypted with old-symmetrical-key, new data encrypted with symmetrical-key
key-rotation-connection {
  encryption {
    encryption-enabled = true
    symmetrical-key = "anotherBase64Key256bitsLongForAESGCM32Bytes="
    old-symmetrical-key = "vJFSTPE9PO2BtZlcMAwNjs8jdFvQCk0Ya9MVdYjRJUU="
    json-pointers = ["/uri", "/credentials/password"]
  }
}

# Example 3: Encryption disabled (no encryption, no old key)
disabled-encryption-connection {
  encryption {
    encryption-enabled = false
    json-pointers = ["/uri", "/credentials/password"]
  }
}

# Example 4: Encryption disabled with old key (for reading old encrypted data)
# Useful during migration from encrypted to unencrypted state
disabled-with-old-key-connection {
  encryption {
    encryption-enabled = false
    symmetrical-key = ""
    old-symmetrical-key = "vJFSTPE9PO2BtZlcMAwNjs8jdFvQCk0Ya9MVdYjRJUU="
    json-pointers = ["/uri", "/credentials/password"]
  }
}

# Example 5: Invalid configuration - should fail validation
# (encryption enabled but no key)
invalid-no-key-connection {
  encryption {
    encryption-enabled = true
    symmetrical-key = ""
    json-pointers = ["/uri", "/credentials/password"]
  }
}

# Example 6: Invalid configuration - should fail validation
# (both keys are the same)
invalid-same-keys-connection {
  encryption {
    encryption-enabled = true
    symmetrical-key = "vJFSTPE9PO2BtZlcMAwNjs8jdFvQCk0Ya9MVdYjRJUU="
    old-symmetrical-key = "vJFSTPE9PO2BtZlcMAwNjs8jdFvQCk0Ya9MVdYjRJUU="
    json-pointers = ["/uri", "/credentials/password"]
  }
}
