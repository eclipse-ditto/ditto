name: Release and publish Helm chart

env:
  VERSION_HELM: "v3.13.3"
on:
  workflow_dispatch:
    inputs:
      chartVersion:
        description: 'Helm chart version'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.VERSION_HELM }}

      - name: Helm | Login
        shell: bash
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | helm registry login -u eclipsedittobot --password-stdin registry-1.docker.io

      - name: Helm | Package
        shell: bash
        env:
          CHART_VERSION: ${{ inputs.chartVersion }}
        run: helm package deployment/helm/ditto --dependency-update --version "$CHART_VERSION"

      - name: Helm | Push
        shell: bash
        env:
          CHART_VERSION: ${{ inputs.chartVersion }}
        run: helm push "ditto-${CHART_VERSION}.tgz" oci://registry-1.docker.io/eclipse

      - name: Helm | Logout
        shell: bash
        run: helm registry logout registry-1.docker.io

      - name: Helm | Output
        id: output
        shell: bash
        env:
          CHART_VERSION: ${{ inputs.chartVersion }}
        run: echo "image=registry-1.docker.io/eclipse/ditto:${CHART_VERSION}" >> $GITHUB_OUTPUT
