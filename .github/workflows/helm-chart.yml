name: Lint and test Helm chart

env:
  CONFIG_OPTION_CHART_TESTING: "--config .github/ct.yml"
  VERSION_CHART_TESTING: "v3.11.0"
  VERSION_HELM: "v3.13.3"
  VERSION_PYTHON: "3.10"
on:
  pull_request:
    paths:
      - 'deployment/helm/**'
      - '.github/workflows/helm-chart.yml'
      - '.github/ct.yml'
      - '.github/kubeval.sh'

jobs:
  lint-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.VERSION_HELM }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.VERSION_PYTHON }}
          check-latest: true
      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1
        with:
          version: ${{ env.VERSION_CHART_TESTING }}
      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          changed=$(ct list-changed $CT_CONFIG --target-branch "$DEFAULT_BRANCH")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct lint $CT_CONFIG --target-branch "$DEFAULT_BRANCH"

  kubeval-chart:
    runs-on: ubuntu-latest
    needs: lint-chart
    strategy:
      matrix:
        # the versions supported by kubeval are the ones for
        # which a folder exists at
        # https://github.com/yannh/kubernetes-json-schema/
        k8s:
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Fetch history for chart testing
        run: git fetch --prune --unshallow
      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.VERSION_HELM }}
      - name: Run kubeval
        env:
          KUBERNETES_VERSION: ${{ matrix.k8s }}
        run: .github/kubeval.sh

  install-chart:
    name: install-chart
    runs-on: ubuntu-latest
    needs:
      - lint-chart
      - kubeval-chart
    strategy:
      matrix:
        # the versions supported by chart-testing are the tags
        # available for the docker.io/kindest/node image
        # https://hub.docker.com/r/kindest/node/tags
        k8s:
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Fetch history for chart testing
        run: git fetch --prune --unshallow
      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.VERSION_HELM }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.VERSION_PYTHON }}
          check-latest: true
      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1
        with:
          version: ${{ env.VERSION_CHART_TESTING }}
      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          changed=$(ct list-changed $CT_CONFIG --target-branch "$DEFAULT_BRANCH")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create kind ${{ matrix.k8s }} cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@9e8295d178de23cbfbd8fa16cf844eec1d773a07 # v1.4.0
        with:
          node_image: kindest/node:${{ matrix.k8s }}
      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct install $CT_CONFIG --target-branch "$DEFAULT_BRANCH"
