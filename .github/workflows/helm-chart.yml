name: Lint and test Helm chart

env:
  CONFIG_OPTION_CHART_TESTING: "--config .github/ct.yml"
  VERSION_CHART_TESTING: "v3.11.0"
  VERSION_HELM: "v3.13.3"
  VERSION_PYTHON: "3.10"
on:
  pull_request:
    paths:
      - 'deployment/helm/**'
      - '!deployment/helm/**/CHANGELOG.md'
      - '!deployment/helm/**/README.md'
      - '.github/workflows/helm-chart.yml'
      - '.github/ct.yml'
      - '.github/kubeval.sh'

permissions:
  contents: read

jobs:
  lint-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.VERSION_HELM }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.VERSION_PYTHON }}
          check-latest: true
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ env.VERSION_CHART_TESTING }}
      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          changed=$(ct list-changed $CT_CONFIG --target-branch "$DEFAULT_BRANCH")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct lint $CT_CONFIG --target-branch "$DEFAULT_BRANCH"

  kubeval-chart:
    runs-on: ubuntu-latest
    needs: lint-chart
    strategy:
      matrix:
        # the versions supported by kubeval are the ones for
        # which a folder exists at
        # https://github.com/yannh/kubernetes-json-schema/
        k8s:
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Fetch history for chart testing
        run: git fetch --prune --unshallow
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.VERSION_HELM }}
      - name: Run kubeval
        env:
          KUBERNETES_VERSION: ${{ matrix.k8s }}
        run: .github/kubeval.sh

  install-chart:
    name: install-chart
    runs-on: ubuntu-latest
    needs:
      - lint-chart
      - kubeval-chart
    strategy:
      matrix:
        # the versions supported by chart-testing are the tags
        # available for the docker.io/kindest/node image
        # https://hub.docker.com/r/kindest/node/tags
        k8s:
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Fetch history for chart testing
        run: git fetch --prune --unshallow
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.VERSION_HELM }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.VERSION_PYTHON }}
          check-latest: true
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ env.VERSION_CHART_TESTING }}
      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          changed=$(ct list-changed $CT_CONFIG --target-branch "$DEFAULT_BRANCH")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create kind ${{ matrix.k8s }} cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s }}
      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ env.CONFIG_OPTION_CHART_TESTING }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct install $CT_CONFIG --target-branch "$DEFAULT_BRANCH"
