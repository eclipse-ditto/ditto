name: build-maven

on:
  push:
    branches:
      - master
      - release-*

  # Run build for any PR except some directories
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'deployment/**'
      - 'documentation/**'
      - 'ui/**'
      - 'benchmark-tool/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'maven'

      - name: Build with Maven
        run: mvn package javadoc:jar source:jar --batch-mode --errors --quiet -DcreateJavadoc=true -Dpekko.test.single-expect-default=10s --file pom.xml -Dbuild.environment=Github
