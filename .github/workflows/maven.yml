name: build-maven

on:
  push:
    branches:
      - master
      - release-*

  # Run build for any PR except some directories
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'deployment/**'
      - 'documentation/**'
      - 'ui/**'
      - 'benchmark-tool/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'maven'

      - name: Build with Maven
        run: mvn package javadoc:jar source:jar --batch-mode --errors --quiet -DcreateJavadoc=true -Dpekko.test.single-expect-default=10s --file pom.xml -Dbuild.environment=Github
