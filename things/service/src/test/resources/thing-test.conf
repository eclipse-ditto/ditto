thing {
  shutdown-timeout = 5s
  activity-check {
    inactive-interval = 100d
    deleted-interval = 100d
  }
  snapshot {
    interval = 100d
    threshold = 2
  }
  supervisor {
    exponential-backoff {
      min = 1s
      max = 10s
      random-factor = 0.2
    }
    local-ask {
      # Reduced from default 45s to avoid long waits in tests when ask is sent to a dead/dying child actor
      timeout-during-recovery = 5s
    }
  }
  merge {
    remove-empty-objects-after-patch-condition-filtering = false
  }
}
