ditto {
  # The CBOR serializer used for Jsonifiable persistence events looks up parsing
  # strategies via this implementation. Pointing at TimeseriesMappingStrategies
  # gives it the ability to deserialize IngestDataPoints (which is part of the
  # GlobalCommandRegistry it inherits).
  mapping-strategy.implementation = "org.eclipse.ditto.timeseries.api.TimeseriesMappingStrategies"
}

pekko {
  loglevel = "WARNING"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]

  actor {
    provider = "local"
    serializers {
      cbor = "org.eclipse.ditto.internal.utils.cluster.CborJsonifiableSerializer"
      jackson-cbor = "org.apache.pekko.serialization.jackson.JacksonCborSerializer"
    }
    serialization-bindings {
      "org.eclipse.ditto.base.model.json.Jsonifiable" = cbor
      "org.eclipse.ditto.internal.utils.cluster.PekkoJacksonCborSerializable" = jackson-cbor
    }
  }

  persistence {
    # Wire test plugins under the same names the actor uses in production. The
    # in-memory plugin survives within a single ActorSystem so persistence-id replays
    # work for restart-style tests; shutting down the ActorSystem clears the journal.
    journal.plugin = "pekko-contrib-mongodb-persistence-timeseries-journal"
    snapshot-store.plugin = "pekko-contrib-mongodb-persistence-timeseries-snapshots"
  }
}

pekko-contrib-mongodb-persistence-timeseries-journal {
  class = "io.github.alstanchev.pekko.persistence.inmemory.journal.InMemoryAsyncWriteJournal"
  plugin-dispatcher = "pekko.actor.default-dispatcher"
  ask-timeout = 10s
}

pekko-contrib-mongodb-persistence-timeseries-snapshots {
  class = "io.github.alstanchev.pekko.persistence.inmemory.snapshot.InMemorySnapshotStore"
  plugin-dispatcher = "pekko.actor.default-dispatcher"
  ask-timeout = 10s
}
