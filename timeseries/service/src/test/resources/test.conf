ditto {
  mapping-strategy.implementation = "org.eclipse.ditto.timeseries.api.TimeseriesMappingStrategies"
}

pekko {
  loglevel = "WARNING"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]

  actor {
    provider = "local"
    serializers {
      cbor = "org.eclipse.ditto.internal.utils.cluster.CborJsonifiableSerializer"
    }
    serialization-bindings {
      "org.eclipse.ditto.base.model.json.Jsonifiable" = cbor
    }
  }
}
