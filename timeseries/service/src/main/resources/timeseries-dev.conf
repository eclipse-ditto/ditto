ditto {
  http {
    hostname = "localhost"
    port = 8095
  }

  metrics.prometheus.port = 9016

  # Local-dev MongoDB connection (consumed by DefaultMongoDbConfig + MongoClientWrapper —
  # same path the sibling services use). The path segment IS the default database name:
  # the Mongo driver populates DittoMongoClient#getDefaultDatabase from ConnectionString,
  # so without `/<db>` the adapter would see a null default database and initialize()
  # would fail. Keep the database segment present in any URI override.
  mongodb {
    uri = "mongodb://localhost:27017/ditto_ts"
    uri = ${?MONGO_DB_URI}
  }

  timeseries {
    # Dev default: strict mode — read-path enforces READ_TS. Flip to true to test the
    # simplified mode (a plain READ grant unlocks timeseries reads on the resource).
    simplified-read-permission = false
    simplified-read-permission = ${?TIMESERIES_SIMPLIFIED_READ_PERMISSION}

    adapter {
      type = "mongodb"
      mongodb {
        collection-prefix = "ts_"
        granularity = "seconds"
      }
    }
  }
}

pekko {
  management.http.port = 25640

  remote {
    watch-failure-detector {
      expected-response-after = 120s
    }

    artery {
      canonical.hostname = "127.0.0.1"
      canonical.port = 2563
      canonical.port = ${?REMOTE_PORT}
      bind.bind-timeout = 6s
      bind.bind-timeout = ${?ARTERY_BIND_TIMEOUT}
    }
  }

  cluster {
    failure-detector {
      expected-response-after = 120s
      threshold = 16.0
      acceptable-heartbeat-pause = 120s
    }

    seed-nodes = [
      "pekko://ditto-cluster@127.0.0.1:2552", # port of the policies service to join in cluster
      "pekko://ditto-cluster@"${pekko.remote.artery.canonical.hostname}":"${pekko.remote.artery.canonical.port}
    ]
  }
}
