ditto {
  service-name = "timeseries"
  mapping-strategy.implementation = "org.eclipse.ditto.timeseries.api.TimeseriesMappingStrategies"

  cluster {
    # required for Pekko sharding/cluster bootstrap
  }

  # MongoDB connection settings — read by DefaultMongoDbConfig and consumed by
  # MongoClientWrapper. Mirrors the sibling-service convention (things.conf
  # `ditto.mongodb.database = "things"`, policies.conf `database = "policies"`, …).
  # MongoClientWrapper handles AWS IAM (IRSA), pool sizing, SSL, and credential
  # refresh internally based on `options.use-aws-iam-role` etc.; the timeseries
  # adapter just hands `MongoDbConfig` to the wrapper and gets a configured
  # MongoClient back.
  mongodb {
    database = "ditto_ts"
    database = ${?MONGO_DB_DATABASE}
  }

  timeseries {
    # Read-permission mode (two-mode contract per issue #2291 Section 6.1):
    #   - false (default, strict): the read-path enforcer requires an explicit READ_TS grant
    #     on every requested path. Historical data access can be granted separately from live
    #     data access — the fine-grained model.
    #   - true (simplified): the enforcer instead checks the standard READ permission. Useful
    #     for deployments preferring "if you can read the current value, you can read its
    #     history" semantics, without rewriting existing policies to add READ_TS grants.
    # A boolean rather than a free-form permission name — any other value would be a
    # deployment footgun (typo'd permissions are silently treated as "no permission" by the
    # policy enforcer).
    simplified-read-permission = false
    simplified-read-permission = ${?TIMESERIES_SIMPLIFIED_READ_PERMISSION}

    # Adapter selection — concrete adapter configuration is read by the adapter implementation
    # itself once the MongoDB / IoTDB / TimescaleDB adapter modules are wired in.
    adapter {
      type = "mongodb"
      type = ${?TIMESERIES_ADAPTER_TYPE}

      # MongoDB Time Series adapter — Ditto's default. The connection itself
      # (URI / IAM / pool sizing / SSL) comes from `ditto.mongodb.*` above and is
      # resolved by `DefaultMongoDbConfig` + `MongoClientWrapper` — same path the
      # sibling services use. The block below carries only the bits specific to
      # the time-series adapter (per-namespace collection naming + granularity +
      # retention).
      mongodb {
        collection-prefix = "ts_"
        collection-prefix = ${?TIMESERIES_MONGODB_COLLECTION_PREFIX}

        granularity = "seconds"
        granularity = ${?TIMESERIES_MONGODB_GRANULARITY}

        # Default retention applied to MongoDB Time Series collections, mapped to
        # TimeSeriesOptions.expireAfter(seconds). Timeseries is append-only, so without a retention
        # storage grows unbounded — hence a sane default of 90 days rather than "keep forever".
        # Set to "unlimited" (or "off"/"none") to disable expiration. The adapter reconciles
        # EXISTING collections to this value on startup via collMod, so changing it takes effect
        # without a manual migration (no longer create-time only).
        retention = 90d
        retention = ${?TIMESERIES_MONGODB_RETENTION}

        # Per-namespace retention overrides, keyed by Thing namespace. A listed namespace uses its
        # own retention instead of the default above; others fall back to the default. Values are
        # positive HOCON durations (per-namespace "unlimited" is not supported — set the default to
        # "unlimited" instead). Reconciled onto existing collections on startup, same as the default.
        # In Helm these are rendered from `timeseries.config.adapter.mongodb.retentionOverrides`.
        retention-overrides {
          # "com.acme.hifreq"   = 7d
          # "org.eclipse.ditto" = 365d
        }

        # Safety ceiling on the number of data points pulled into application memory per path on
        # the raw and window-function (derivative/rate/integral/percentile) read paths, so an
        # over-broad time range cannot exhaust the heap. Results that hit it are truncated and a
        # warning is logged; narrow the range, add a `limit`, or downsample with a `step`.
        max-query-result-size = 1000000
        max-query-result-size = ${?TIMESERIES_MONGODB_MAX_QUERY_RESULT_SIZE}

        # Server-side time budget for a single read (find or aggregation), applied as MongoDB
        # `maxTime`. Bounds the blast radius of a pathological query.
        query-timeout = 60s
        query-timeout = ${?TIMESERIES_MONGODB_QUERY_TIMEOUT}

        # Capabilities this adapter advertises to the TimeseriesQueryPlanner. The planner routes each
        # query to the backend's native path or the portable scan()+compute-kernel path based on
        # these. Defaults match a modern MongoDB (5.0+) and rarely need changing; override them when
        # running an older / feature-limited MongoDB, or to deliberately force behaviour.
        capabilities {
          # native-query: whether MongoDB's query() is a complete executor, so the planner delegates
          # whole queries to it (the fast path, preserving unit metadata). KEEP true for MongoDB —
          # setting false forces every query through the portable scan()+kernel path.
          native-query = true
          native-query = ${?TIMESERIES_MONGODB_CAP_NATIVE_QUERY}

          # pushable-aggregations: aggregations computed IN the DB engine, rather than in the compute
          # kernel. The group accumulators are version-independent. The advanced ones are gated by
          # MongoDB version / semantics:
          #   - derivative : native $derivative window operator (5.0+); EXACT match to the kernel and
          #                  scales server-side (no scan-ceiling limit). Default ON. `rate` has no
          #                  native operator and always stays in the kernel.
          #   - integral   : native $integral window operator (5.0+); EXACT match, server-side.
          #                  Default ON.
          #   - percentile : native $percentile accumulator (7.0+). APPROXIMATE (t-digest) — its
          #                  value differs slightly from the kernel's exact percentile, so it is
          #                  OFF by default. Add "percentile" here to opt in on MongoDB 7.0+.
          # A list, so it can't come from an env var — in Helm it renders from
          # `timeseries.config.adapter.mongodb.capabilities.pushableAggregations`.
          pushable-aggregations = ["avg", "min", "max", "sum", "count", "first", "last", "stddev",
                                   "derivative", "integral"]

          # native-fill-strategies: gap-fill strategies the backend applies natively via
          # $densify/$fill (MongoDB 5.3+). Only "linear" (-> $fill linear) and "previous" (-> locf)
          # are pushable; "zero"/"null" and any timezone-aligned query stay in the kernel. Empty by
          # default keeps all fill in the kernel (identical across backends, and marks gaps). A list;
          # rendered in Helm from `timeseries.config.adapter.mongodb.capabilities.nativeFillStrategies`.
          native-fill-strategies = ["linear", "previous"]
        }
      }
    }
  }
}

pekko.cluster {
  roles = [
    ${ditto.service-name},
    # Required so BlockedNamespaces.of(actorSystem) — invoked transitively by
    # CachingPolicyEnforcerProvider — can join the ddata replicator group.
    # Without this role, the policy-enforcer cache never receives PolicyTag
    # invalidations, so policy updates (e.g. granting READ_TS) silently fail
    # to take effect on the timeseries-service until restart.
    # Other Ditto services (things, policies, connectivity, …) include this
    # role for the same reason; see policies/enforcement BlockedNamespaces.java
    # and the inline comment in connectivity.conf cluster.roles.
    "blocked-namespaces-aware"
  ]
}

# Required by org.eclipse.ditto.internal.utils.namespaces.BlockedNamespaces, which is
# instantiated indirectly by CachingPolicyEnforcerProvider when the timeseries enforcement
# chain resolves the PolicyEnforcerProviderExtension. Other Ditto services declare an
# identical block in their own service.conf — we follow the same pattern rather than
# moving the dispatcher into ditto-service-base.conf so the change stays scoped to the
# timeseries module.
blocked-namespaces-dispatcher {
  type = Dispatcher
  executor = "org.eclipse.ditto.internal.utils.metrics.service.executor.InstrumentedForkJoinExecutorServiceConfigurator"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 3.0
    parallelism-max = 32
    parallelism-max = ${?DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = 5
}

include "kamon.conf"
include "timeseries-extension.conf"
include file("/opt/ditto/timeseries-extension.conf")
