ditto {
  service-name = "timeseries"
  mapping-strategy.implementation = "org.eclipse.ditto.timeseries.api.TimeseriesMappingStrategies"

  cluster {
    # required for Pekko sharding/cluster bootstrap
  }

  # Override the shared ditto-mongo.conf default so the pekko-persistence journal +
  # snapshot store for the TimeseriesIngestActor land in a service-named database
  # (matches the things/policies/connectivity convention: things.conf -> "things",
  # policies.conf -> "policies", connectivity.conf -> "connectivity"). The Helm
  # deployment overrides this via MONGO_DB_URI / MONGO_DB_DATABASE.
  mongodb {
    database = "timeseries"
    database = ${?MONGO_DB_DATABASE}
  }

  # cleanup of journal + snapshots for the per-Thing TimeseriesIngestActor entities. Mirrors the
  # block in things.conf / policies.conf so the operator surface is consistent across services.
  # Cleanup itself is wired in TimeseriesRootActor via PersistenceCleanupActor; this block lets
  # operators tune the schedule without flipping fallthrough defaults silently.
  cleanup {
    enabled = true
    enabled = ${?CLEANUP_ENABLED}
    history-retention-duration = 0d
    history-retention-duration = ${?CLEANUP_HISTORY_RETENTION_DURATION}
  }

  timeseries {
    # Enforcement configuration.
    enforcement {
      # Permission required to read timeseries data.
      # Options:
      #   - "READ_TS": Subjects need an explicit READ_TS grant on the requested resource (default).
      #   - "READ":    A READ grant on the resource is also sufficient to read timeseries data.
      required-permission = "READ_TS"
      required-permission = ${?TIMESERIES_REQUIRED_PERMISSION}
    }

    # Adapter selection — concrete adapter configuration is read by the adapter implementation
    # itself once the MongoDB / IoTDB / TimescaleDB adapter modules are wired in.
    adapter {
      type = "mongodb"
      type = ${?TIMESERIES_ADAPTER_TYPE}

      # MongoDB Time Series adapter — the default Ditto-shipped implementation. Production
      # operators override these via the matching TIMESERIES_MONGODB_* env vars in the Helm
      # deployment template.
      mongodb {
        uri = "mongodb://localhost:27017"
        uri = ${?TIMESERIES_MONGODB_URI}

        database = "ditto_ts"
        database = ${?TIMESERIES_MONGODB_DATABASE}

        collection-prefix = "ts_"
        collection-prefix = ${?TIMESERIES_MONGODB_COLLECTION_PREFIX}

        granularity = "seconds"
        granularity = ${?TIMESERIES_MONGODB_GRANULARITY}

        # Optional retention applied to NEW MongoDB Time Series collections at create-time.
        # Maps to TimeSeriesOptions.expireAfter(seconds). Empty (the default) disables
        # expiration; collections retain documents until manually purged. Existing
        # collections are not reconfigured when this value changes — that's an
        # operator-driven collMod migration.
        retention = ${?TIMESERIES_MONGODB_RETENTION}
      }
    }
  }
}

pekko.cluster {
  roles = [
    ${ditto.service-name},
    # Required so BlockedNamespaces.of(actorSystem) — invoked transitively by
    # CachingPolicyEnforcerProvider — can join the ddata replicator group.
    # Without this role, the policy-enforcer cache never receives PolicyTag
    # invalidations, so policy updates (e.g. granting READ_TS) silently fail
    # to take effect on the timeseries-service until restart.
    # Other Ditto services (things, policies, connectivity, …) include this
    # role for the same reason; see policies/enforcement BlockedNamespaces.java
    # and the inline comment in connectivity.conf cluster.roles.
    "blocked-namespaces-aware"
  ]
}

pekko.persistence {
  # Wire the MongoDB-backed journal + snapshot store for the per-Thing
  # TimeseriesIngestActor entities. Same backbone as ThingPersistenceActor uses,
  # different MongoDB collections so the journals stay isolated between services.
  journal.auto-start-journals = [
    "pekko-contrib-mongodb-persistence-timeseries-journal"
  ]
  snapshot-store.auto-start-snapshot-stores = [
    "pekko-contrib-mongodb-persistence-timeseries-snapshots"
  ]
}

# MongoDB journal for the per-Thing TimeseriesIngestActor entities.
pekko-contrib-mongodb-persistence-timeseries-journal {
  class = "pekko.contrib.persistence.mongodb.MongoJournal"
  plugin-dispatcher = "timeseries-journal-persistence-dispatcher"

  circuit-breaker {
    max-failures = 5
    max-failures = ${?BREAKER_MAXTRIES}
    call-timeout = 5s
    call-timeout = ${?BREAKER_TIMEOUT}
    reset-timeout = 3s
    reset-timeout = ${?BREAKER_RESET}
  }

  overrides {
    journal-collection = "timeseries_journal"
    journal-index = "timeseries_journal_index"
    realtime-collection = "timeseries_realtime"
    metadata-collection = "timeseries_metadata"
    metadata-index = "timeseries_metadata_index"
  }
}

pekko-contrib-mongodb-persistence-timeseries-journal-read {
  class = "pekko.contrib.persistence.mongodb.MongoReadJournal"
  plugin-dispatcher = "timeseries-journal-persistence-dispatcher"

  overrides {
    journal-collection = "timeseries_journal"
    journal-index = "timeseries_journal_index"
    realtime-collection = "timeseries_realtime"
    metadata-collection = "timeseries_metadata"
    metadata-index = "timeseries_metadata_index"
  }
}

pekko-contrib-mongodb-persistence-timeseries-snapshots {
  class = "pekko.contrib.persistence.mongodb.MongoSnapshots"
  plugin-dispatcher = "timeseries-snaps-persistence-dispatcher"

  circuit-breaker {
    max-failures = 5
    max-failures = ${?SNAPSHOT_BREAKER_MAXTRIES}
    call-timeout = 10s
    call-timeout = ${?SNAPSHOT_BREAKER_TIMEOUT}
    reset-timeout = 6s
    reset-timeout = ${?SNAPSHOT_BREAKER_RESET}
  }

  overrides {
    snaps-collection = "timeseries_snaps"
    snaps-index = "timeseries_snaps_index"
  }
}

# Dedicated dispatcher for the timeseries journal so persistence I/O does not
# contend with the actor system's default dispatcher (mirrors the
# thing-journal-persistence-dispatcher pattern).
timeseries-journal-persistence-dispatcher {
  type = Dispatcher
  executor = "org.eclipse.ditto.internal.utils.metrics.service.executor.InstrumentedForkJoinExecutorServiceConfigurator"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 3.0
    parallelism-max = 32
    parallelism-max = ${?DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = 5
}

timeseries-snaps-persistence-dispatcher {
  type = Dispatcher
  executor = "org.eclipse.ditto.internal.utils.metrics.service.executor.InstrumentedForkJoinExecutorServiceConfigurator"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 3.0
    parallelism-max = 32
    parallelism-max = ${?DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = 5
}

# Required by org.eclipse.ditto.internal.utils.namespaces.BlockedNamespaces, which is
# instantiated indirectly by CachingPolicyEnforcerProvider when the timeseries enforcement
# chain resolves the PolicyEnforcerProviderExtension. Other Ditto services declare an
# identical block in their own service.conf — we follow the same pattern rather than
# moving the dispatcher into ditto-service-base.conf so the change stays scoped to the
# timeseries module.
blocked-namespaces-dispatcher {
  type = Dispatcher
  executor = "org.eclipse.ditto.internal.utils.metrics.service.executor.InstrumentedForkJoinExecutorServiceConfigurator"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 3.0
    parallelism-max = 32
    parallelism-max = ${?DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = 5
}

include "kamon.conf"
