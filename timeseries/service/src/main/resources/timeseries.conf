ditto {
  service-name = "timeseries"
  mapping-strategy.implementation = "org.eclipse.ditto.timeseries.api.TimeseriesMappingStrategies"

  cluster {
    # required for Pekko sharding/cluster bootstrap
  }

  timeseries {
    # Enforcement configuration.
    enforcement {
      # Permission required to read timeseries data.
      # Options:
      #   - "READ_TS": Subjects need an explicit READ_TS grant on the requested resource (default).
      #   - "READ":    A READ grant on the resource is also sufficient to read timeseries data.
      required-permission = "READ_TS"
      required-permission = ${?TIMESERIES_REQUIRED_PERMISSION}
    }

    # Adapter selection — concrete adapter configuration is read by the adapter implementation
    # itself once the MongoDB / IoTDB / TimescaleDB adapter modules are wired in.
    adapter {
      type = "mongodb"
      type = ${?TIMESERIES_ADAPTER_TYPE}

      # MongoDB Time Series adapter — the default Ditto-shipped implementation. Production
      # operators override these via the matching TIMESERIES_MONGODB_* env vars in the Helm
      # deployment template.
      mongodb {
        uri = "mongodb://localhost:27017"
        uri = ${?TIMESERIES_MONGODB_URI}

        database = "ditto_ts"
        database = ${?TIMESERIES_MONGODB_DATABASE}

        collection-prefix = "ts_"
        collection-prefix = ${?TIMESERIES_MONGODB_COLLECTION_PREFIX}

        granularity = "seconds"
        granularity = ${?TIMESERIES_MONGODB_GRANULARITY}

        # Optional retention applied to NEW MongoDB Time Series collections at create-time.
        # Maps to TimeSeriesOptions.expireAfter(seconds). Empty (the default) disables
        # expiration; collections retain documents until manually purged. Existing
        # collections are not reconfigured when this value changes — that's an
        # operator-driven collMod migration.
        retention = ${?TIMESERIES_MONGODB_RETENTION}
      }
    }
  }
}

pekko.cluster {
  roles = [
    ${ditto.service-name},
    # Required so BlockedNamespaces.of(actorSystem) — invoked transitively by
    # CachingPolicyEnforcerProvider — can join the ddata replicator group.
    # Without this role, the policy-enforcer cache never receives PolicyTag
    # invalidations, so policy updates (e.g. granting READ_TS) silently fail
    # to take effect on the timeseries-service until restart.
    # Other Ditto services (things, policies, connectivity, …) include this
    # role for the same reason; see policies/enforcement BlockedNamespaces.java
    # and the inline comment in connectivity.conf cluster.roles.
    "blocked-namespaces-aware"
  ]
}

# Required by org.eclipse.ditto.internal.utils.namespaces.BlockedNamespaces, which is
# instantiated indirectly by CachingPolicyEnforcerProvider when the timeseries enforcement
# chain resolves the PolicyEnforcerProviderExtension. Other Ditto services declare an
# identical block in their own service.conf — we follow the same pattern rather than
# moving the dispatcher into ditto-service-base.conf so the change stays scoped to the
# timeseries module.
blocked-namespaces-dispatcher {
  type = Dispatcher
  executor = "org.eclipse.ditto.internal.utils.metrics.service.executor.InstrumentedForkJoinExecutorServiceConfigurator"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 3.0
    parallelism-max = 32
    parallelism-max = ${?DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = 5
}

include "kamon.conf"
