<h5 data-bs-toggle="collapse" data-bs-target="#collapseFeatures">
    Features <span class="badge rounded-pill bg-info" id="badgeFeatureCount"></span></h5>
<hr />
<div class="collapse show" id="collapseFeatures">
    <div class="split-h resizable_pane" style="height: 45vh;" data-split="horizontal" data-split-sizes="[33,67]" data-split-key="things-features">
        <div class="split-panel resizable_flex_column">
            <div class="input-group has-validation">
                <input class="form-control" id="tableValidationFeature" hidden="true"></input>
                <div class="invalid-feedback"></div>
            </div>
            <div class="table-wrap">
                <table class="table table-striped table-hover table-sm">
                    <tbody id="tbodyFeatures"></tbody>
                </table>
            </div>
        </div>
        <div class="split-panel resizable_flex_column">
            <ul class="nav nav-tabs nav-fill" id="tabItemsFeatures">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabCrudFeature">Manage</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" data-bs-target="#tabTimeseriesFeature">Timeseries</a>
                </li>
            </ul>
            <div class="tab-content" style="flex-grow: 1;" id="tabContentFeatures">
                <div class="tab-pane container active no-margin" id="tabCrudFeature">
                    <crud-toolbar id="crudFeature" label="Feature ID">
                        <div class="input-group input-group-sm mb-1">
                            <label class="input-group-text">Definition</label>
                            <input type="text" class="form-control" id="inputFeatureDefinition" disabled></input>
                        </div>
                        <div class="input-group input-group-sm mb-1" style="flex-grow: 1; display: flex;">
                            <label class="input-group-text">Properties<br>and<br>Desired<br>Properties</label>
                            <div class="ace_container" style="flex-grow: 1;">
                                <div class="script_editor" id="featurePropertiesEditor"></div>
                            </div>
                            <div class="ace_container" style="flex-grow: 1;">
                                <div class="script_editor" id="featureDesiredPropertiesEditor"></div>
                            </div>
                        </div>
                    </crud-toolbar>
                </div>
                <div class="tab-pane container no-margin" id="tabTimeseriesFeature">
                    <div class="input-group input-group-sm mb-1">
                        <label class="input-group-text" style="width: 7em;">Path(s)</label>
                        <input type="text" class="form-control" id="inputTimeseriesPath"
                               placeholder="/features/<feature>/properties/<property> (comma-separate for several)"></input>
                    </div>
                    <div class="input-group input-group-sm mb-1">
                        <label class="input-group-text" style="width: 7em;">From (UTC)</label>
                        <input type="datetime-local" class="form-control" id="inputTimeseriesFrom" step="1"></input>
                        <label class="input-group-text" style="width: 5em;">To (UTC)</label>
                        <input type="datetime-local" class="form-control" id="inputTimeseriesTo" step="1"></input>
                        <label class="input-group-text" style="width: 5em;">Limit</label>
                        <input type="number" class="form-control" id="inputTimeseriesLimit" min="1" max="10000"
                               placeholder="optional" style="max-width: 8em;"></input>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="buttonTimeseriesRetrieve">
                            <i class="bi bi-arrow-clockwise"></i> Retrieve
                        </button>
                    </div>
                    <div class="input-group input-group-sm mb-1">
                        <label class="input-group-text" style="width: 7em;">Aggregation</label>
                        <select class="form-select" id="selectTimeseriesAgg" title="Aggregation function">
                            <option value="">Raw (none)</option>
                            <optgroup label="Per-bucket (needs Step)">
                                <option value="avg">avg</option>
                                <option value="min">min</option>
                                <option value="max">max</option>
                                <option value="sum">sum</option>
                                <option value="count">count</option>
                                <option value="first">first</option>
                                <option value="last">last</option>
                                <option value="stddev">stddev</option>
                            </optgroup>
                            <optgroup label="Advanced">
                                <option value="derivative">derivative</option>
                                <option value="rate">rate</option>
                                <option value="integral">integral</option>
                                <option value="percentile">percentile</option>
                            </optgroup>
                        </select>
                        <label class="input-group-text">Step</label>
                        <select class="form-select" id="selectTimeseriesStep" title="Downsampling interval">
                            <option value="">none</option>
                            <option value="1m">1m</option>
                            <option value="5m">5m</option>
                            <option value="15m">15m</option>
                            <option value="1h">1h</option>
                            <option value="6h">6h</option>
                            <option value="1d">1d</option>
                        </select>
                        <label class="input-group-text">Fill</label>
                        <select class="form-select" id="selectTimeseriesFill" title="Gap fill strategy">
                            <option value="">none</option>
                            <option value="null">null</option>
                            <option value="previous">previous</option>
                            <option value="zero">zero</option>
                        </select>
                        <label class="input-group-text" id="labelTimeseriesPercentile" hidden>p</label>
                        <input type="number" class="form-control" id="inputTimeseriesPercentile" min="0" max="100"
                               step="1" placeholder="0-100" style="max-width: 6em;" hidden></input>
                    </div>
                    <div class="text-muted small mb-1" id="timeseriesStatus" style="min-height: 1em;"></div>
                    <!-- One block per returned series is rendered here by timeseries.ts.
                         Self-contained scroll region so every series is reachable even when the
                         feature pane itself doesn't scroll. -->
                    <div id="timeseriesResults" style="max-height: 55vh; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
