<div id="historyModeContainer" class="mb-2">
    <div class="form-check form-switch mb-1">
        <input class="form-check-input" type="checkbox" role="switch" id="historyModeSwitch" disabled>
        <label class="form-check-label" for="historyModeSwitch">
            <i class="bi bi-clock-history"></i> Time Travel Mode
        </label>
    </div>
    <div id="historyBanner" class="alert alert-warning history-banner py-1 px-2 mb-1 align-items-center d-none">
        <i class="bi bi-clock-history me-2"></i>
        <span id="historyBannerText">Time travel active</span>
    </div>
    <div id="historyControls" hidden>
        <div class="input-group input-group-sm mb-1">
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="historyMode" id="historyRadioRevision" checked>
                <label class="btn btn-outline-secondary btn-sm" for="historyRadioRevision">By Revision</label>
                <input type="radio" class="btn-check" name="historyMode" id="historyRadioTimestamp">
                <label class="btn btn-outline-secondary btn-sm" for="historyRadioTimestamp">By Timestamp</label>
            </div>
        </div>
        <div id="historyRevisionControls">
            <div class="input-group input-group-sm mb-1">
                <span class="input-group-text" id="historyRevisionMin" data-bs-toggle="tooltip"
                    title="Oldest available revision">1</span>
                <button class="btn btn-outline-secondary btn-sm" id="historyRevisionPrev" data-bs-toggle="tooltip"
                    title="Previous revision">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <input type="range" class="form-range mx-2" id="historyRevisionSlider" min="1" max="1" value="1"
                    style="flex: 1;">
                <button class="btn btn-outline-secondary btn-sm" id="historyRevisionNext" data-bs-toggle="tooltip"
                    title="Next revision">
                    <i class="bi bi-chevron-right"></i>
                </button>
                <input type="number" class="form-control form-control-sm" id="historyRevisionInput"
                    min="1" max="1" value="1">
                <span class="input-group-text" id="historyRevisionMax" data-bs-toggle="tooltip"
                    title="Most recent revision">1</span>
            </div>
        </div>
        <div id="historyTimestampControls" hidden>
            <div class="input-group input-group-sm mb-1">
                <label class="input-group-text">Timestamp</label>
                <input type="datetime-local" class="form-control form-control-sm" id="historyTimestampInput" step="1">
            </div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="historyShowUpdates" data-bs-toggle="tooltip"
            title="Show historical Thing Updates starting from the current time travel position">
            <i class="bi bi-arrow-down-circle"></i> Show updates from here
        </button>
    </div>
</div>
