type: object
description: |-
  A imports alias maps a label to one or more entries additions targets. Subject operations
  (GET/PUT/DELETE on subjects) using the alias label are transparently fanned out to all
  referenced targets. This enables backward-compatible API migration when template policies
  split a single entry into multiple namespace-scoped entries.
properties:
  targets:
    type: array
    description: |-
      The list of entries additions targets this alias fans out to. Each target references
      a specific entry addition within a policy import.
    items:
      $ref: 'importsAliasTarget.yml'
required:
  - targets
example:
  targets:
    - import: "energy-corp:power-plant-roles"
      entry: "operator-reactor"
    - import: "energy-corp:power-plant-roles"
      entry: "operator-turbine"
