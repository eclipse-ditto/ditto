type: array
description: |-
  Restricts this policy entry to things whose namespace matches at least one pattern.
  If omitted or empty, the entry applies to all namespaces.
  * `com.acme` matches only that exact namespace
  * `com.acme.*` matches namespaces below `com.acme`, but not `com.acme` itself
items:
  type: string
example: [ "com.acme", "com.acme.*" ]
