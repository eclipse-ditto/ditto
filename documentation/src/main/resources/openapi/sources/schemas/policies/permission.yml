type: string
description: |
  A Permission allows a certain action on an entity.
   * `READ` and `WRITE` apply to all resource types (`thing:/`, `policy:/`, `message:/`).
   * `READ_TS` (since 4.0.0) only applies to `thing:/...` resources and gates retrieval
     of historical timeseries data via the Timeseries API. Its enforcement is governed
     by the boolean Timeseries service setting `ditto.timeseries.simplified-read-permission`:
     when `false` (default, strict) an explicit `READ_TS` grant is required on every requested
     path; when `true` (simplified) a standard `READ` grant on the resource is also sufficient.
enum:
  - READ
  - WRITE
  - READ_TS