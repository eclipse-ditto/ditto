type: object
description: |-
  A target reference within a subject alias, pointing to a specific entry addition in a policy
  import. Subject operations on the alias label are transparently fanned out to this target's
  entries additions.
properties:
  import:
    type: string
    description: |-
      The policy ID of the import this target refers to. Must match a key in the policy's
      "imports" object.
  entry:
    type: string
    description: |-
      The label of the entry within the import's "entriesAdditions" that this target refers to.
required:
  - import
  - entry
example:
  import: "energy-corp:power-plant-roles"
  entry: "operator"
