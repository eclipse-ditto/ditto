type: object
description: |-
  A collection of subject aliases keyed by label. Each alias maps a label to one or more
  entries additions targets, enabling transparent subject fan-out through the existing
  entries subjects API.

  A label must not exist as both a subject alias and a local policy entry simultaneously.
additionalProperties:
  $ref: 'subjectAlias.yml'
example:
  operator:
    targets:
      - import: "energy-corp:power-plant-roles"
        entry: "operator-reactor"
      - import: "energy-corp:power-plant-roles"
        entry: "operator-turbine"
