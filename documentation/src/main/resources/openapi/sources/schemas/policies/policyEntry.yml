type: object
description: |-
  Single policy entry. Both `subjects` and `resources` are optional — they
  default to empty when absent. An entry may define `references` to inherit
  subjects, resources, and namespaces from other entries (local or imported).
properties:
  subjects:
    $ref: 'subjects.yml'
  resources:
    $ref: 'resources.yml'
  namespaces:
    $ref: 'namespaces.yml'
  importable:
    $ref: 'importable.yml'
  allowedAdditions:
    $ref: 'allowedAdditions.yml'
  references:
    $ref: 'references.yml'
